<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f0f1a" />
  <title>🐍 뱀 게임</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="top-bar">
        <div class="score-item">
          <span class="label">점수</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="score-item">
          <span class="label">최고점수</span>
          <span class="value" id="best-score">0</span>
        </div>
        <div class="score-item">
          <span class="label">레벨</span>
          <span class="value" id="level">1</span>
        </div>
        <button id="ranking-btn" class="ranking-btn">🏆 랭킹</button>
      </div>
    </header>

    <div class="canvas-wrapper">
      <canvas id="game-canvas" width="480" height="600"></canvas>
      <div class="overlay" id="overlay">
        <div class="overlay-content">
          <!-- 장식 뱀들 (양쪽에서 감싸는 형태) -->
          <div class="title-snakes">
            <div class="title-snake left">🐍</div>
            <div class="title-snake right">🐍</div>
          </div>

          <!-- 메인 타이틀 -->
          <div class="title-logo" id="overlay-icon">
            <div class="title-text-wrap snake">
              <span class="title-shadow" aria-hidden="true">SNAKE</span>
              <span class="title-outline" aria-hidden="true">SNAKE</span>
              <span class="title-fill">SNAKE</span>
              <span class="title-highlight" aria-hidden="true">SNAKE</span>
            </div>
            <div class="title-text-wrap game">
              <span class="title-shadow" aria-hidden="true">GAME</span>
              <span class="title-outline" aria-hidden="true">GAME</span>
              <span class="title-fill">GAME</span>
              <span class="title-highlight" aria-hidden="true">GAME</span>
            </div>
          </div>

          <!-- 별/반짝이 장식 -->
          <div class="title-stars">
            <span class="star s1">⭐</span>
            <span class="star s2">✨</span>
            <span class="star s3">⭐</span>
            <span class="star s4">✨</span>
          </div>

          <p id="overlay-title" class="title-sub"></p>
          <p id="overlay-msg" class="title-hint">방향키·WASD 또는 화면 스와이프로 이동</p>

          <div id="name-section" class="name-section hidden">
            <p class="name-label">🎖 기록을 남기세요</p>
            <div class="name-row">
              <input type="text" id="player-name" class="name-input"
                maxlength="10" placeholder="닉네임 (최대 10자)"
                autocomplete="off" spellcheck="false" enterkeyhint="done" />
              <button id="save-btn" class="save-btn">저장</button>
            </div>
            <button id="skip-btn" class="skip-btn">건너뛰기</button>
          </div>

          <button id="start-btn" class="start-btn-main">▶ START</button>
        </div>
      </div>
    </div>

    <!-- 모바일 D-패드 + 아이템 버튼 -->
    <div class="controls">
      <div class="dpad">
        <button class="dpad-btn" id="btn-up" aria-label="위">▲</button>
        <div class="dpad-row">
          <button class="dpad-btn" id="btn-left" aria-label="왼쪽">◀</button>
          <button class="dpad-btn center" id="btn-pause" aria-label="일시정지">⏸</button>
          <button class="dpad-btn" id="btn-right" aria-label="오른쪽">▶</button>
        </div>
        <button class="dpad-btn" id="btn-down" aria-label="아래">▼</button>
      </div>
      <div class="item-panel">
        <button class="dpad-btn item-btn" id="btn-item" aria-label="아이템 사용">🎒</button>
        <div class="inventory-slots" id="inventory-slots">
          <span class="inv-slot empty">·</span>
          <span class="inv-slot empty">·</span>
          <span class="inv-slot empty">·</span>
          <span class="inv-slot empty">·</span>
          <span class="inv-slot empty">·</span>
        </div>
        <span class="item-hint">Q키</span>
      </div>
    </div>
  </div>

  <!-- 랭킹 모달 -->
  <div id="ranking-modal" class="ranking-modal hidden">
    <div class="ranking-panel">
      <div class="ranking-header">
        <div class="ranking-title">
          <span class="trophy">🏆</span>
          <h2>명예의 전당</h2>
        </div>
        <button id="close-ranking" class="close-btn">✕</button>
      </div>
      <div id="ranking-list" class="ranking-list"></div>
      <p class="ranking-footer">최대 10위까지 기록됩니다</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="game.js"></script>
</body>
</html>
